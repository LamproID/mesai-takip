<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>MesaiTakip - QR Okut</title>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4ff;min-height:100vh}

  nav{background:linear-gradient(135deg,#1a1a2e,#16213e);height:56px;display:flex;align-items:center;
      justify-content:center;box-shadow:0 2px 12px #0004;position:sticky;top:0;z-index:100}
  .nav-brand{color:#e2e8ff;font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px}
  .conn-dot{width:9px;height:9px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:4px;transition:background .3s}
  .conn-dot.ok{background:#22c55e}

  .page{max-width:480px;margin:0 auto;padding:18px 14px}

  .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px #0001;margin-bottom:14px}

  select{width:100%;padding:13px 14px;border-radius:10px;border:2px solid #e2e8f0;font-size:16px;outline:none;cursor:pointer;background:#fff}
  select:focus{border-color:#4f46e5}

  input[type=text]{padding:11px 14px;border-radius:10px;border:2px solid #e2e8f0;font-size:15px;width:100%;outline:none}

  .btn{border:none;border-radius:10px;padding:13px 20px;font-weight:700;cursor:pointer;font-size:15px;width:100%}
  .btn-primary{background:#4f46e5;color:#fff}
  .btn-red{background:#ef4444;color:#fff}

  .modal-bg{position:fixed;inset:0;background:#0008;z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
  .modal{background:#fff;border-radius:20px;padding:28px;max-width:340px;width:100%;text-align:center;box-shadow:0 8px 40px #0004}
  .hidden{display:none}

  .text-center{text-align:center}
  .text-muted{color:#64748b;font-size:14px}
  .mt8{margin-top:8px} .mt16{margin-top:16px}
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><span class="conn-dot" id="conn-dot"></span>📷 MesaiTakip - QR Okut</div>
</nav>

<div class="page">

  <div class="card" id="emp-select-card">
    <div id="token-status" style="margin-bottom:14px"></div>
    <div style="font-weight:700;color:#1a1a2e;margin-bottom:10px;font-size:16px">👤 Adınızı seçin:</div>
    <select id="emp-select">
      <option value="">-- Çalışan Seçin --</option>
    </select>
    <button class="btn btn-primary mt16" id="confirm-btn" onclick="confirmFromUrl()" style="display:none">✅ Onayla</button>
  </div>

  <div class="card" id="manual-card" style="display:none">
    <div style="font-weight:700;color:#1a1a2e;margin-bottom:8px;font-size:15px">⌨️ Manuel Giriş</div>
    <div class="text-muted mt8" style="font-size:13px;margin-bottom:12px">QR kod linki yoksa, kodu buraya yapıştırın:</div>
    <input type="text" id="manual-token" placeholder="Örn: IN-2026-06-17-XXXXXX" style="margin-bottom:10px"/>
    <button class="btn btn-primary" onclick="processManualToken()">✅ Gönder</button>
  </div>

</div>

<div id="result-modal" class="modal-bg hidden" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modal-icon" style="font-size:52px;margin-bottom:12px"></div>
    <div id="modal-title" style="font-size:21px;font-weight:800;margin-bottom:6px"></div>
    <div id="modal-sub" style="color:#64748b;font-size:15px;margin-bottom:20px;white-space:pre-line"></div>
    <button class="btn btn-primary" onclick="closeModal()">Tamam</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDCWxXbODaYfaPZMSbTgGf7SMYwAmwAHAQ",
  authDomain: "mesai-takip-c6727.firebaseapp.com",
  databaseURL: "https://mesai-takip-c6727-default-rtdb.firebaseio.com",
  projectId: "mesai-takip-c6727",
  storageBucket: "mesai-takip-c6727.firebasestorage.app",
  messagingSenderId: "86080704138",
  appId: "1:86080704138:web:5f93245f17e4cc1cd4a773"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref('.info/connected').on('value', (snap) => {
  document.getElementById('conn-dot').className = 'conn-dot' + (snap.val() ? ' ok' : '');
});

let EMPLOYEES = [];
let RECORDS_CACHE = [];

db.ref('employees').on('value', (snap) => {
  const val = snap.val() || {};
  EMPLOYEES = Object.keys(val).map(k => ({ id: k, ...val[k] }));
  buildEmpSelect();
});

db.ref('records').on('value', (snap) => {
  const val = snap.val() || {};
  RECORDS_CACHE = Object.keys(val).map(k => ({ id: k, ...val[k] }));
});

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
const SECRET = 'MESAI2026';

function todayKey(){
  // Türkiye saatine göre tarihi al (UTC+3), UTC kaymasını önler
  const trDate = new Date().toLocaleDateString('en-CA', { timeZone: 'Europe/Istanbul' });
  return trDate; // formatı: YYYY-MM-DD
}

function dailyToken(type){
  const raw = `${type}-${todayKey()}-${SECRET}`;
  let h=0;
  for(let i=0;i<raw.length;i++) h=(Math.imul(31,h)+raw.charCodeAt(i))|0;
  return `${type.toUpperCase()}-${todayKey()}-${(h>>>0).toString(36).toUpperCase()}`;
}

function nowStr(){
  return new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function buildEmpSelect(){
  const sel = document.getElementById('emp-select');
  const prevVal = sel.value;
  sel.innerHTML='<option value="">-- Çalışan Seçin --</option>';
  EMPLOYEES.forEach(e=>{
    const o=document.createElement('option');
    o.value=e.id; o.textContent=`${e.name} ${e.surname}`;
    sel.appendChild(o);
  });
  if(prevVal) sel.value = prevVal;
}

// ══════════════════════════════════════════════════
// URL'DEN TOKEN OKUMA
// ══════════════════════════════════════════════════
let urlToken = null;
let urlType  = null;

function readUrlParams(){
  const params = new URLSearchParams(window.location.search);
  urlToken = params.get('token');
  urlType  = params.get('type');

  const statusEl = document.getElementById('token-status');
  const confirmBtn = document.getElementById('confirm-btn');

  if(!urlToken || !urlType){
    statusEl.innerHTML = `<div style="background:#fff7ed;border:2px solid #f97316;border-radius:10px;padding:12px;font-size:13px;color:#92400e">
      ⚠️ QR kod linki bulunamadı. Lütfen PC ekranındaki QR kodu telefon kameranızla (Safari/Kamera uygulaması) okutarak bu sayfayı açın.
    </div>`;
    confirmBtn.style.display='none';
    document.getElementById('manual-card').style.display='block';
    return false;
  }

  const tokenIn  = dailyToken('in');
  const tokenOut = dailyToken('out');

  if(urlToken !== tokenIn && urlToken !== tokenOut){
    statusEl.innerHTML = `<div style="background:#fef2f2;border:2px solid #ef4444;border-radius:10px;padding:12px;font-size:13px;color:#991b1b">
      ❌ Bu QR kod bugün için geçerli değil. Lütfen PC ekranındaki güncel kodu tekrar okutun.
    </div>`;
    confirmBtn.style.display='none';
    return false;
  }

  const typeLabel = urlType === 'in' ? '🟢 İŞE GİRİŞ' : '🔴 İŞTEN ÇIKIŞ';
  const bgColor = urlType === 'in' ? '#f0fdf4' : '#fff7ed';
  const borderColor = urlType === 'in' ? '#22c55e' : '#f97316';
  statusEl.innerHTML = `<div style="background:${bgColor};border:2px solid ${borderColor};border-radius:10px;padding:14px;text-align:center">
    <div style="font-size:17px;font-weight:800;color:#1a1a2e">${typeLabel}</div>
    <div style="font-size:13px;color:#64748b;margin-top:4px">İşlemi onaylamak için adınızı seçin</div>
  </div>`;
  confirmBtn.style.display='block';
  return true;
}

document.getElementById('emp-select').addEventListener('change', function(){
  document.getElementById('confirm-btn').style.display = (this.value && urlToken) ? 'block' : 'none';
});

function confirmFromUrl(){
  const empId = document.getElementById('emp-select').value;
  if(!empId){ alert('Önce adınızı seçin!'); return; }
  processQRData(urlToken, empId);
}

async function processQRData(data, empId){
  const tokenIn  = dailyToken('in');
  const tokenOut = dailyToken('out');

  if(data !== tokenIn && data !== tokenOut){
    showModal('❌','Geçersiz QR Kod','Bu kod bugün için geçerli değil.\nLütfen PC ekranındaki güncel QR kodu okutun.', false);
    return;
  }

  const type = data === tokenIn ? 'in' : 'out';
  await registerAttendance(empId, type);
}

function processManualToken(){
  const empId = document.getElementById('emp-select').value;
  const token = document.getElementById('manual-token').value.trim().toUpperCase();
  if(!empId){ alert('Önce çalışan seçin!'); return; }
  if(!token){ alert('Kod girin!'); return; }
  processQRData(token, empId);
}

async function registerAttendance(empId, type){
  const emp = EMPLOYEES.find(e=>e.id===empId);
  if(!emp){ showModal('❌','Hata','Çalışan bulunamadı.',false); return; }

  // Bu çalışanın tüm kayıtlarını zaman sırasına göre al (gece nöbeti gibi gün-aşan vardiyalar için)
  const empRecords = RECORDS_CACHE
    .filter(r => r.empId === empId)
    .sort((a,b) => (a.timestamp||0) - (b.timestamp||0));

  const lastRecord = empRecords.length ? empRecords[empRecords.length-1] : null;

  if(type === 'in'){
    // Son kayıt zaten "giriş" ise ve kapatılmamışsa, tekrar giriş yapılamaz
    if(lastRecord && lastRecord.type === 'in'){
      showModal('⚠️',`${emp.name} ${emp.surname}`,
        `Zaten açık bir giriş kaydınız var! (${lastRecord.date} ${lastRecord.time})\nÖnce çıkış yapmalısınız.`, false);
      return;
    }
  } else { // type === 'out'
    // Çıkış yapabilmek için son kaydın "giriş" olması ve kapatılmamış olması gerekir
    if(!lastRecord || lastRecord.type !== 'in'){
      showModal('⚠️','Giriş Gerekli','Çıkış yapmadan önce açık bir giriş kaydınız olmalı!',false);
      return;
    }
  }

  const today = todayKey();
  const rec = {
    empId, name:emp.name, surname:emp.surname,
    type, time:nowStr(), date:today,
    timestamp: Date.now()
  };

  try {
    await db.ref('records').push(rec);
    const typeLabel = type==='in' ? '🟢 İşe Giriş' : '🔴 İşten Çıkış';
    showModal(type==='in'?'✅':'👋', `${emp.name} ${emp.surname}`, `${typeLabel} kaydedildi\n🕐 ${rec.time}`, true);
    // URL'i temizle, kazara yenilemede tekrar kayıt oluşmasın
    window.history.replaceState({}, document.title, window.location.pathname);
    document.getElementById('confirm-btn').style.display='none';
    document.getElementById('emp-select').value='';
  } catch(err){
    showModal('❌','Bağlantı Hatası','Kayıt yapılamadı, internet bağlantınızı kontrol edin.', false);
  }
}

// ══════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════
function showModal(icon, title, sub, ok){
  document.getElementById('modal-icon').textContent=icon;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-title').style.color=ok?'#166534':'#991b1b';
  document.getElementById('modal-sub').textContent=sub;
  document.getElementById('result-modal').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('result-modal').classList.add('hidden');
}

// ══════════════════════════════════════════════════
// BAŞLAT
// ══════════════════════════════════════════════════
readUrlParams();
</script>
</body>
</html>
